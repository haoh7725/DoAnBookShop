<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Giỏ hàng')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <h1 class="font-serif fw-bold text-brand fs-3 mb-4">Giỏ hàng của bạn</h1>

    <!-- Giỏ trống -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
        <i class="bi bi-cart-x text-muted" style="font-size:64px"></i>
        <p class="text-muted mt-3">Giỏ hàng đang trống.</p>
        <a th:href="@{/books}" class="btn btn-brand mt-2">Tiếp tục mua sắm</a>
    </div>

    <!-- Có hàng -->
    <div th:if="${!#lists.isEmpty(cartItems)}" class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th style="width:80px">Ảnh</th>
                            <th>Sách</th>
                            <th class="text-center" style="width:140px">Số lượng</th>
                            <th class="text-end" style="width:120px">Thành tiền</th>
                            <th style="width:50px"></th>
                        </tr>
                        </thead>
                        <tbody id="cartTableBody">
                        <tr th:each="item : ${cartItems}" th:id="'row-' + ${item.id}">
                            <td>
                                <img th:if="${item.book.imagePath != null}"
                                     th:src="${item.book.imagePath}"
                                     class="rounded" style="width:56px;height:72px;object-fit:cover"/>
                                <div th:if="${item.book.imagePath == null}"
                                     class="rounded bg-light d-flex align-items-center justify-content-center"
                                     style="width:56px;height:72px">
                                    <i class="bi bi-book text-muted"></i>
                                </div>
                            </td>
                            <td>
                                <a th:href="@{/books/{id}(id=${item.book.id})}"
                                   th:text="${item.book.title}"
                                   class="fw-medium text-brand text-decoration-none"></a>
                                <p class="text-muted small mb-0" th:text="${item.book.author}"></p>
                                <p class="text-accent small mb-0 fw-medium"
                                   th:text="${#numbers.formatInteger(
                       item.book.salePrice > 0 ? item.book.salePrice : item.book.price,
                       0,'COMMA') + 'đ'}"></p>
                            </td>
                            <td class="text-center">
                                <div class="d-flex align-items-center justify-content-center gap-1">
                                    <button class="btn btn-sm btn-outline-secondary"
                                            th:onclick="'updateQty(' + ${item.id} + ', ' + (${item.quantity} - 1) + ')'"
                                            style="width:30px;height:30px;padding:0">−</button>
                                    <span th:text="${item.quantity}"
                                          th:id="'qty-' + ${item.id}"
                                          class="fw-medium px-2" style="min-width:24px;text-align:center"></span>
                                    <button class="btn btn-sm btn-outline-secondary"
                                            th:onclick="'updateQty(' + ${item.id} + ', ' + (${item.quantity} + 1) + ')'"
                                            style="width:30px;height:30px;padding:0">+</button>
                                </div>
                            </td>
                            <td class="text-end fw-medium text-brand"
                                th:id="'subtotal-' + ${item.id}"
                                th:text="${#numbers.formatInteger(
                      (item.book.salePrice > 0 ? item.book.salePrice : item.book.price) * item.quantity,
                      0,'COMMA') + 'đ'}">
                            </td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-danger"
                                        th:onclick="'removeItem(' + ${item.id} + ')'">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-3">
                <a th:href="@{/books}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Tiếp tục mua sắm
                </a>
            </div>
        </div>

        <!-- Tổng tiền -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="font-serif fw-bold text-brand mb-3">Tóm tắt đơn hàng</h5>
                <div class="d-flex justify-content-between mb-2 small text-muted">
                    <span>Tạm tính</span>
                    <span id="totalDisplay"
                          th:text="${#numbers.formatInteger(total, 0, 'COMMA') + 'đ'}"></span>
                </div>
                <div class="d-flex justify-content-between mb-2 small text-muted">
                    <span>Phí vận chuyển</span>
                    <span class="text-success">Miễn phí</span>
                </div>
                <hr/>
                <div class="d-flex justify-content-between fw-bold text-brand mb-4">
                    <span>Tổng cộng</span>
                    <span id="totalFinal"
                          th:text="${#numbers.formatInteger(total, 0, 'COMMA') + 'đ'}"></span>
                </div>
                <a th:href="@{/checkout}" class="btn btn-brand w-100">
                    <i class="bi bi-credit-card me-2"></i>Đặt hàng
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:inline="javascript">
    const csrf = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';

    function updateQty(itemId, newQty) {
        fetch('/cart/update/' + itemId + '?quantity=' + newQty, {
            method: 'POST',
            headers: { [csrfHeader]: csrf }
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    if (newQty <= 0) {
                        document.getElementById('row-' + itemId)?.remove();
                    } else {
                        document.getElementById('qty-' + itemId).textContent = newQty;
                    }
                    updateTotals(data.total, data.cartCount);
                    if (data.cartCount === 0) location.reload();
                }
            });
    }

    function removeItem(itemId) {
        fetch('/cart/remove/' + itemId, {
            method: 'POST',
            headers: { [csrfHeader]: csrf }
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('row-' + itemId)?.remove();
                    updateTotals(data.total, data.cartCount);
                    if (data.cartCount === 0) location.reload();
                }
            });
    }

    function updateTotals(total, count) {
        const formatted = new Intl.NumberFormat('vi-VN').format(total) + 'đ';
        document.getElementById('totalDisplay').textContent = formatted;
        document.getElementById('totalFinal').textContent = formatted;
        document.getElementById('cartCount').textContent = count;
    }
</script>
</body>
</html>
