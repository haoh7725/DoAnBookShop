<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Chi tiết đơn hàng')}" ></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5" style="max-width:800px">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/orders}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1 class="font-serif fw-bold text-brand fs-3 mb-0">
            Đơn hàng #<span th:text="${order.id}"></span>
        </h1>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>

    <!-- Thông tin đơn -->
    <div class="card border-0 shadow-sm p-4 mb-4">
        <div class="row g-3 small">
            <div class="col-sm-6">
                <p class="text-muted mb-1">Ngày đặt</p>
                <p class="fw-medium mb-0"
                   th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></p>
            </div>
            <div class="col-sm-6">
                <p class="text-muted mb-1">Trạng thái</p>
                <span th:switch="${order.status.name()}">
          <span th:case="'PENDING'"   class="badge text-bg-warning fs-6">Chờ xác nhận</span>
          <span th:case="'CONFIRMED'" class="badge text-bg-info fs-6">Đã xác nhận</span>
          <span th:case="'SHIPPING'"  class="badge text-bg-primary fs-6">Đang giao</span>
          <span th:case="'COMPLETED'" class="badge text-bg-success fs-6">Hoàn thành</span>
          <span th:case="'CANCELLED'" class="badge text-bg-secondary fs-6">Đã hủy</span>
        </span>
            </div>
            <div class="col-12">
                <p class="text-muted mb-1">Địa chỉ giao hàng</p>
                <p class="fw-medium mb-0" th:text="${order.address}"></p>
            </div>
        </div>
    </div>

    <!-- Danh sách sản phẩm -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Sách</th>
                    <th class="text-center">Số lượng</th>
                    <th class="text-end">Đơn giá</th>
                    <th class="text-end">Thành tiền</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${details}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:if="${d.book.imagePath != null}"
                                 th:src="${d.book.imagePath}"
                                 class="rounded" style="width:40px;height:52px;object-fit:cover"/>
                            <div>
                                <p class="mb-0 fw-medium small" th:text="${d.book.title}"></p>
                                <p class="mb-0 text-muted" style="font-size:11px" th:text="${d.book.author}"></p>
                            </div>
                        </div>
                    </td>
                    <td class="text-center" th:text="${d.quantity}"></td>
                    <td class="text-end small"
                        th:text="${#numbers.formatInteger(d.price,0,'COMMA') + 'đ'}"></td>
                    <td class="text-end fw-medium"
                        th:text="${#numbers.formatInteger(d.price * d.quantity,0,'COMMA') + 'đ'}"></td>
                </tr>
                </tbody>
                <tfoot class="table-light">
                <tr>
                    <td colspan="3" class="text-end fw-bold">Tổng cộng</td>
                    <td class="text-end fw-bold text-brand"
                        th:text="${#numbers.formatInteger(order.totalPrice,0,'COMMA') + 'đ'}"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- Nút hủy đơn (chỉ hiện khi PENDING) -->
    <div th:if="${order.status.name() == 'PENDING'}">
        <form th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post"
              onsubmit="return confirm('Bạn chắc chắn muốn hủy đơn này?')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-danger">
                <i class="bi bi-x-circle me-1"></i>Hủy đơn hàng
            </button>
        </form>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
