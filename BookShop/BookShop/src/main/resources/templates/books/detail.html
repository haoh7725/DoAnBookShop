<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Danh sách sách')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <h1 class="font-serif fw-bold text-brand fs-3 mb-4">Tất cả sách</h1>

    <!-- Lọc theo thể loại -->
    <div class="d-flex gap-2 flex-wrap mb-4">
        <a th:href="@{/books}" class="btn btn-sm btn-outline-secondary">Tất cả</a>
        <a th:each="cat : ${categories}"
           th:href="@{/books(categoryId=${cat.id})}"
           th:text="${cat.name}"
           class="btn btn-sm btn-outline-secondary"></a>
    </div>

    <!-- Grid sách -->
    <div class="row g-3">
        <div th:each="book : ${books}" class="col-6 col-sm-4 col-md-3 col-xl-2">
            <div class="card h-100 border-0 shadow-sm" style="transition:all .2s"
                 onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,.13)'"
                 onmouseout="this.style.transform='';this.style.boxShadow=''">
                <a th:href="@{/books/{id}(id=${book.id})}" class="position-relative d-block overflow-hidden" style="padding-top:140%">
                    <img th:if="${book.imagePath != null}"
                         th:src="${book.imagePath}" th:alt="${book.title}"
                         class="position-absolute top-0 start-0 w-100 h-100"
                         style="object-fit:cover"
                         onerror="this.parentElement.innerHTML='<div class=\'position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-light\'><i class=\'bi bi-book text-muted\' style=\'font-size:48px\'></i></div>'"/>
                    <div th:if="${book.imagePath == null}"
                         class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-light">
                        <i class="bi bi-book text-muted" style="font-size:48px"></i>
                    </div>
                    <span th:if="${book.salePrice > 0}" class="badge position-absolute top-0 start-0 m-2" style="background:var(--accent)">SALE</span>
                </a>
                <div class="card-body p-2 d-flex flex-column">
                    <p class="text-accent small mb-1 text-uppercase fw-semibold" style="font-size:10px;letter-spacing:.5px"
                       th:text="${book.category != null ? book.category.name : ''}"></p>
                    <h6 class="font-serif fw-semibold mb-1 text-brand" style="font-size:13px;line-height:1.3"
                        th:text="${book.title}"></h6>
                    <p class="text-muted mb-2" style="font-size:11px" th:text="${book.author}"></p>
                    <div class="d-flex align-items-center gap-2 mb-2">
            <span class="fw-bold text-brand" style="font-size:14px"
                  th:text="${book.salePrice > 0 ?
                    #numbers.formatInteger(book.salePrice,0,'COMMA') + 'đ' :
                    #numbers.formatInteger(book.price,0,'COMMA') + 'đ'}"></span>
                        <span th:if="${book.salePrice > 0}"
                              class="text-muted text-decoration-line-through" style="font-size:11px"
                              th:text="${#numbers.formatInteger(book.price,0,'COMMA') + 'đ'}"></span>
                    </div>
                    <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-outline-secondary btn-sm mt-auto w-100" style="font-size:12px">
                        Xem chi tiết
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(books)}" class="col-12">
            <p class="text-muted text-center py-5">Chưa có sách nào.</p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
