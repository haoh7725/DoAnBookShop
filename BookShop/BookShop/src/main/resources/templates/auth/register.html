<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng ký')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5" style="max-width:480px">
    <div class="card border-0 shadow-sm p-4 p-md-5">
        <h1 class="font-serif fw-bold text-brand fs-3 mb-4 text-center">Tạo tài khoản</h1>

        <div th:if="${error}" th:text="${error}" class="alert alert-danger py-2 small"></div>

        <form action="/register" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label small fw-medium">Tên đăng nhập <span class="text-danger">*</span></label>
                <input type="text" name="username" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-medium">Mật khẩu <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-medium">Họ tên</label>
                <input type="text" name="fullName" class="form-control"/>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-medium">Email</label>
                <input type="email" name="email" class="form-control"/>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-medium">Số điện thoại</label>
                <input type="text" name="phone" class="form-control"/>
            </div>

            <button type="submit" class="btn btn-brand w-100">Đăng ký</button>
        </form>

        <p class="text-center small text-muted mt-3 mb-0">
            Đã có tài khoản? <a th:href="@{/login}" class="text-accent fw-medium">Đăng nhập</a>
        </p>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
