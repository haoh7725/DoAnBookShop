<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng ký')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5" style="max-width:480px">
    <div class="card border-0 shadow-sm p-4 p-md-5">
        <h1 class="font-serif fw-bold text-brand fs-3 mb-4 text-center">Tạo tài khoản</h1>

        <div th:if="${error}" th:text="${error}"
             class="alert alert-danger py-2 small">
        </div>

        <form action="/register" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label small fw-medium">
                    Tên đăng nhập <span class="text-danger">*</span>
                </label>
                <input type="text" name="username" class="form-control"
                       th:value="${prevUsername}" required minlength="3"
                       placeholder="Ít nhất 3 ký tự"/>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-medium">
                    Mật khẩu <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                    <input type="password" name="password" id="regPwd"
                           class="form-control" required minlength="6"
                           placeholder="Ít nhất 6 ký tự"/>
                    <button type="button" class="btn btn-outline-secondary"
                            onclick="toggleRegPwd()">
                        <i class="bi bi-eye" id="regEyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-medium">Họ tên</label>
                <input type="text" name="fullName" class="form-control"
                       th:value="${prevFullName}"/>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-medium">Email</label>
                <input type="email" name="email" class="form-control"
                       th:value="${prevEmail}" placeholder="example@email.com"/>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-medium">Số điện thoại</label>
                <input type="text" name="phone" class="form-control"
                       th:value="${prevPhone}" placeholder="0901234567"/>
                <div class="form-text">Định dạng: 0xxxxxxxxx hoặc +84xxxxxxxxx</div>
            </div>

            <button type="submit" class="btn btn-brand w-100">Đăng ký</button>
        </form>

        <p class="text-center small text-muted mt-3 mb-0">
            Đã có tài khoản?
            <a th:href="@{/login}" class="text-accent fw-medium">Đăng nhập</a>
        </p>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script>
    function toggleRegPwd() {
        const input = document.getElementById('regPwd');
        const icon  = document.getElementById('regEyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>
</html>
