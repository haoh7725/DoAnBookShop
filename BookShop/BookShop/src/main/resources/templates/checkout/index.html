<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Thanh toán')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5" style="max-width:900px">
    <h1 class="font-serif fw-bold text-brand fs-3 mb-4">Thanh toán</h1>

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="row g-4">
        <!-- Form giao hàng -->
        <div class="col-md-7">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="font-serif fw-bold text-brand mb-3">Thông tin giao hàng</h5>
                <form th:action="@{/checkout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label small fw-medium">Họ tên</label>
                        <input type="text" class="form-control" th:value="${user.fullName}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Số điện thoại</label>
                        <input type="text" class="form-control" th:value="${user.phone}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">
                            Địa chỉ giao hàng <span class="text-danger">*</span>
                        </label>
                        <textarea name="address" class="form-control" rows="3" required
                                  placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-medium">Phương thức thanh toán</label>
                        <div class="d-flex gap-3 mt-1">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="payment" value="COD"
                                       id="cod" checked/>
                                <label class="form-check-label" for="cod">
                                    <i class="bi bi-cash me-1"></i>COD — Thanh toán khi nhận hàng
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-brand w-100 py-2">
                        <i class="bi bi-bag-check me-2"></i>Xác nhận đặt hàng
                    </button>
                </form>
            </div>
        </div>

        <!-- Tóm tắt giỏ hàng -->
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="font-serif fw-bold text-brand mb-3">Đơn hàng của bạn</h5>
                <div th:each="item : ${cartItems}" class="d-flex gap-3 mb-3 align-items-start">
                    <img th:if="${item.book.imagePath != null}"
                         th:src="${item.book.imagePath}"
                         class="rounded" style="width:48px;height:60px;object-fit:cover;flex-shrink:0"/>
                    <div class="flex-grow-1">
                        <p class="mb-0 small fw-medium text-brand" th:text="${item.book.title}"></p>
                        <p class="mb-0 text-muted" style="font-size:11px"
                           th:text="'x' + ${item.quantity}"></p>
                    </div>
                    <span class="small fw-medium text-brand flex-shrink-0"
                          th:text="${#numbers.formatInteger(
                  (item.book.salePrice > 0 ? item.book.salePrice : item.book.price) * item.quantity,
                  0,'COMMA') + 'đ'}"></span>
                </div>
                <hr/>
                <div class="d-flex justify-content-between fw-bold text-brand">
                    <span>Tổng cộng</span>
                    <span th:text="${#numbers.formatInteger(total,0,'COMMA') + 'đ'}"></span>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
