<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Thanh toán')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5" style="max-width:900px">
    <h1 class="font-serif fw-bold text-brand fs-3 mb-4">Thanh toán</h1>

    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="row g-4">

        <!-- Form giao hàng -->
        <div class="col-md-7">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="font-serif fw-bold text-brand mb-3">Thông tin giao hàng</h5>
                <form id="checkoutForm" th:action="@{/checkout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <!-- Coupon code gửi kèm khi submit -->
                    <input type="hidden" name="couponCode" id="appliedCouponCode"
                           th:value="${coupon != null ? coupon.code : ''}"/>

                    <div class="mb-3">
                        <label class="form-label small fw-medium">Họ tên</label>
                        <input type="text" class="form-control" th:value="${user.fullName}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Số điện thoại</label>
                        <input type="text" class="form-control" th:value="${user.phone}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">
                            Địa chỉ giao hàng <span class="text-danger">*</span>
                        </label>
                        <textarea name="address" class="form-control" rows="3" required
                                  placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố"></textarea>
                    </div>

                    <!-- Mã giảm giá -->
                    <div class="mb-4">
                        <label class="form-label small fw-medium">Mã giảm giá</label>
                        <div class="input-group">
                            <input type="text" id="couponInput" class="form-control text-uppercase"
                                   placeholder="Nhập mã giảm giá..."
                                   style="font-family:monospace"
                                   th:value="${coupon != null ? coupon.code : ''}"/>
                            <button type="button" class="btn btn-outline-secondary" onclick="applyCoupon()">
                                Áp dụng
                            </button>
                        </div>
                        <!-- Feedback -->
                        <div id="couponSuccess" class="mt-2 text-success small"
                             th:if="${coupon != null}">
                            <i class="bi bi-check-circle-fill me-1"></i>
                            Đã áp dụng mã — giảm
                            <strong th:text="${#numbers.formatInteger(discount,0,'COMMA') + 'đ'}"></strong>
                        </div>
                        <div id="couponError" class="mt-2 text-danger small"
                             th:if="${couponError != null}" th:text="${couponError}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-medium">Phương thức thanh toán</label>
                        <div class="d-flex gap-3 mt-1">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="payment"
                                       value="COD" id="cod" checked/>
                                <label class="form-check-label" for="cod">
                                    <i class="bi bi-cash me-1"></i>COD — Thanh toán khi nhận hàng
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-brand w-100 py-2">
                        <i class="bi bi-bag-check me-2"></i>Xác nhận đặt hàng
                    </button>
                </form>
            </div>
        </div>

        <!-- Tóm tắt đơn hàng -->
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="font-serif fw-bold text-brand mb-3">Đơn hàng của bạn</h5>

                <div th:each="item : ${cartItems}" class="d-flex gap-3 mb-3 align-items-start">
                    <img th:if="${item.book.imagePath != null}"
                         th:src="${item.book.imagePath}"
                         class="rounded" style="width:48px;height:60px;object-fit:cover;flex-shrink:0"/>
                    <div th:if="${item.book.imagePath == null}"
                         class="rounded bg-light d-flex align-items-center justify-content-center flex-shrink-0"
                         style="width:48px;height:60px">
                        <i class="bi bi-book text-muted"></i>
                    </div>
                    <div class="flex-grow-1">
                        <p class="mb-0 small fw-medium text-brand" th:text="${item.book.title}"></p>
                        <p class="mb-0 text-muted" style="font-size:11px"
                           th:text="'x' + ${item.quantity}"></p>
                    </div>
                    <span class="small fw-medium text-brand flex-shrink-0"
                          th:text="${#numbers.formatInteger(
                            (item.book.salePrice > 0 ? item.book.salePrice : item.book.price) * item.quantity,
                            0,'COMMA') + 'đ'}">
                    </span>
                </div>

                <hr/>

                <div class="d-flex justify-content-between small text-muted mb-1">
                    <span>Tạm tính</span>
                    <span id="subtotalDisplay"
                          th:text="${#numbers.formatInteger(total,0,'COMMA') + 'đ'}"></span>
                </div>

                <!-- Giảm giá row (ẩn nếu chưa có coupon) -->
                <div class="d-flex justify-content-between small mb-1"
                     id="discountRow"
                     th:style="${discount > 0 ? '' : 'display:none!important'}">
                    <span class="text-success">
                        <i class="bi bi-tag-fill me-1"></i>Giảm giá
                        <span id="couponLabel"
                              th:text="${coupon != null ? '(' + coupon.code + ')' : ''}"></span>
                    </span>
                    <span class="text-success fw-medium" id="discountDisplay"
                          th:text="${discount > 0 ? '-' + #numbers.formatInteger(discount,0,'COMMA') + 'đ' : ''}">
                    </span>
                </div>

                <div class="d-flex justify-content-between small text-muted mb-2">
                    <span>Phí vận chuyển</span>
                    <span class="text-success">Miễn phí</span>
                </div>

                <hr/>
                <div class="d-flex justify-content-between fw-bold text-brand fs-5">
                    <span>Tổng cộng</span>
                    <span id="finalTotalDisplay"
                          th:text="${#numbers.formatInteger(finalTotal,0,'COMMA') + 'đ'}"></span>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<script th:inline="javascript">
    const csrf       = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    const rawTotal   = /*[[${total}]]*/ 0;

    function applyCoupon() {
        const code = document.getElementById('couponInput').value.trim();
        const successEl = document.getElementById('couponSuccess');
        const errorEl   = document.getElementById('couponError');

        if (successEl) successEl.textContent = '';
        if (errorEl)   errorEl.textContent   = '';

        if (!code) return;

        fetch('/checkout/apply-coupon', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                [csrfHeader]: csrf
            },
            body: 'code=' + encodeURIComponent(code)
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    // Cập nhật hidden input để gửi kèm khi submit
                    document.getElementById('appliedCouponCode').value = code;

                    // Hiện dòng giảm giá
                    const discountRow = document.getElementById('discountRow');
                    discountRow.style.display = '';
                    document.getElementById('couponLabel').textContent   = '(' + code.toUpperCase() + ')';
                    document.getElementById('discountDisplay').textContent =
                        '-' + new Intl.NumberFormat('vi-VN').format(data.discount) + 'đ';
                    document.getElementById('finalTotalDisplay').textContent =
                        new Intl.NumberFormat('vi-VN').format(data.finalTotal) + 'đ';

                    // Toast
                    if (typeof showToast === 'function') {
                        showToast('Áp dụng mã giảm giá thành công! Giảm ' + data.label, 'success');
                    }

                    // Hiện success msg inline
                    let el = document.getElementById('couponSuccess');
                    if (!el) {
                        el = document.createElement('div');
                        el.id = 'couponSuccess';
                        el.className = 'mt-2 text-success small';
                        document.getElementById('couponInput').closest('.mb-4').appendChild(el);
                    }
                    el.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i>Đã áp dụng — giảm <strong>' +
                        new Intl.NumberFormat('vi-VN').format(data.discount) + 'đ</strong>';
                } else {
                    document.getElementById('appliedCouponCode').value = '';
                    // Reset
                    document.getElementById('discountRow').style.display = 'none';
                    document.getElementById('finalTotalDisplay').textContent =
                        new Intl.NumberFormat('vi-VN').format(rawTotal) + 'đ';

                    let el = document.getElementById('couponError');
                    if (!el) {
                        el = document.createElement('div');
                        el.id = 'couponError';
                        el.className = 'mt-2 text-danger small';
                        document.getElementById('couponInput').closest('.mb-4').appendChild(el);
                    }
                    el.textContent = data.message;
                }
            });
    }

    // Cho phép nhấn Enter trong ô coupon
    document.getElementById('couponInput')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); applyCoupon(); }
    });
</script>
</body>
</html>
