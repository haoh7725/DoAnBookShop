<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý danh mục')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="font-serif fw-bold text-brand fs-3 mb-0">Quản lý danh mục</h1>
        <a th:href="@{/admin/categories/add}" class="btn btn-brand">
            <i class="bi bi-plus-lg me-1"></i>Thêm danh mục
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Tên danh mục</th>
                <th>Mô tả</th>
                <th style="width:120px">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cat : ${categories}">
                <td class="text-muted small" th:text="${cat.id}"></td>
                <td class="fw-medium" th:text="${cat.name}"></td>
                <td class="text-muted small" th:text="${cat.description}"></td>
                <td>
                    <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                       class="btn btn-sm btn-outline-secondary me-1">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Xóa danh mục này?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(categories)}">
                <td colspan="4" class="text-center text-muted py-4">Chưa có danh mục nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
