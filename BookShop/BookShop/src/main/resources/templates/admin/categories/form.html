<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Danh mục')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5" style="max-width:540px">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/categories}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1 class="font-serif fw-bold text-brand fs-3 mb-0"
            th:text="${category.id == null ? 'Thêm danh mục' : 'Sửa danh mục'}"></h1>
    </div>

    <div class="card border-0 shadow-sm p-4">
        <form th:action="${category.id == null
            ? '/admin/categories/add'
            : '/admin/categories/edit/' + category.id}"
              th:object="${category}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label small fw-medium">
                    Tên danh mục <span class="text-danger">*</span>
                </label>
                <input type="text" th:field="*{name}" class="form-control" required/>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-medium">Mô tả</label>
                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-brand px-4">
                    <i class="bi bi-floppy me-1"></i>Lưu
                </button>
                <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
