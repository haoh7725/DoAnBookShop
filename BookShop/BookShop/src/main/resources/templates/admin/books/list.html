<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý sách')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="font-serif fw-bold text-brand fs-3 mb-0">Quản lý sách</h1>
        <a th:href="@{/admin/books/add}" class="btn btn-brand">
            <i class="bi bi-plus-lg me-1"></i>Thêm sách mới
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width:70px">Ảnh</th>
                    <th>Tên sách</th>
                    <th>Tác giả</th>
                    <th>Thể loại</th>
                    <th>Giá</th>
                    <th>Tồn kho</th>
                    <th style="width:120px">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td>
                        <img th:if="${book.imagePath != null}" th:src="${book.imagePath}"
                             class="rounded" style="width:50px;height:65px;object-fit:cover"/>
                        <div th:if="${book.imagePath == null}"
                             class="rounded bg-light d-flex align-items-center justify-content-center"
                             style="width:50px;height:65px">
                            <i class="bi bi-book text-muted"></i>
                        </div>
                    </td>
                    <td class="fw-medium" th:text="${book.title}"></td>
                    <td class="text-muted small" th:text="${book.author}"></td>
                    <td>
              <span class="badge rounded-pill text-bg-light border"
                    th:text="${book.category != null ? book.category.name : '—'}"></span>
                    </td>
                    <td class="fw-medium"
                        th:text="${#numbers.formatInteger(book.price,0,'COMMA') + 'đ'}"></td>
                    <td>
                        <span th:if="${book.stock > 0}" th:text="${book.stock}" class="text-success fw-medium"></span>
                        <span th:if="${book.stock == 0}" class="badge text-bg-danger">Hết</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/books/edit/{id}(id=${book.id})}"
                           class="btn btn-sm btn-outline-secondary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/admin/books/delete/{id}(id=${book.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Xóa sách này?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="7" class="text-center text-muted py-4">Chưa có sách nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
