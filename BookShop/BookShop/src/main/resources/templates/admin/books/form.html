<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Form sách</title></head>
<body>
<h1 th:text="${book.id == null ? 'Thêm sách mới' : 'Sửa sách'}"></h1>
<a href="/admin/books">← Quay lại</a>

<form th:action="${book.id == null ? '/admin/books/add' : '/admin/books/edit/' + book.id}"
      th:object="${book}" method="post" enctype="multipart/form-data">

    <label>Tên sách:</label>
    <input type="text" th:field="*{title}" required/><br/>

    <label>Tác giả:</label>
    <input type="text" th:field="*{author}"/><br/>

    <label>NXB:</label>
    <input type="text" th:field="*{publisher}"/><br/>

    <label>Năm xuất bản:</label>
    <input type="number" th:field="*{publishYear}"/><br/>

    <label>Giá:</label>
    <input type="number" th:field="*{price}" required/><br/>

    <label>Giá khuyến mãi (0 = không giảm):</label>
    <input type="number" th:field="*{salePrice}"/><br/>

    <label>Tồn kho:</label>
    <input type="number" th:field="*{stock}"/><br/>

    <label>Thể loại:</label>
    <select th:field="*{category}">
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}">
        </option>
    </select><br/>

    <label>Mô tả:</label>
    <textarea th:field="*{description}" rows="4"></textarea><br/>

    <label>Ảnh bìa:</label>
    <input type="file" name="imageFile" accept="image/*"/><br/>
    <img th:if="${book.imagePath != null}"
         th:src="${book.imagePath}" width="100"/><br/>

    <button type="submit">💾 Lưu</button>
</form>
</body>
</html>
