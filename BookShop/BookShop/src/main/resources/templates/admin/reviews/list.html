</html><!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý đánh giá')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="font-serif fw-bold text-brand fs-3 mb-0">
            Quản lý đánh giá
            <span th:if="${pendingCount > 0}"
                  class="badge text-bg-danger ms-2 fs-6"
                  th:text="${pendingCount} + ' chờ duyệt'"></span>
        </h1>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible" th:text="${successMsg}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Bộ lọc -->
    <div class="d-flex gap-2 mb-3">
        <a href="/admin/reviews"
           class="btn btn-sm"
           th:classappend="${filter == null ? ' btn-brand' : ' btn-outline-secondary'}">
            Tất cả
        </a>
        <a href="/admin/reviews?filter=pending"
           class="btn btn-sm"
           th:classappend="${filter == 'pending' ? ' btn-warning text-dark' : ' btn-outline-warning'}">
            Chờ duyệt
            <span th:if="${pendingCount > 0}" class="badge text-bg-danger ms-1" th:text="${pendingCount}"></span>
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Sách</th>
                    <th>Người đánh giá</th>
                    <th class="text-center">Sao</th>
                    <th>Nội dung</th>
                    <th>Ngày gửi</th>
                    <th>Trạng thái</th>
                    <th style="width:160px">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${reviews}">
                    <td>
                        <p class="mb-0 small fw-medium text-brand" th:text="${r.book.title}"></p>
                        <p class="mb-0 text-muted" style="font-size:11px" th:text="${r.book.author}"></p>
                    </td>
                    <td class="small" th:text="${r.user.fullName ?: r.user.username}"></td>
                    <td class="text-center">
                        <!-- Hiển thị sao -->
                        <span th:each="i : ${#numbers.sequence(1, 5)}"
                              th:class="${i <= r.rating ? 'bi bi-star-fill text-warning' : 'bi bi-star text-muted'}"
                              class="bi" style="font-size:13px"></span>
                        <span class="small text-muted ms-1" th:text="'(' + ${r.rating} + ')'"></span>
                    </td>
                    <td class="small text-muted"
                        style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                        th:text="${r.comment ?: '(Không có nội dung)'}"></td>
                    <td class="small text-muted"
                        th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <span th:switch="${r.status.name()}">
                            <span th:case="'PENDING'"  class="badge text-bg-warning">Chờ duyệt</span>
                            <span th:case="'APPROVED'" class="badge text-bg-success">Đã duyệt</span>
                            <span th:case="'REJECTED'" class="badge text-bg-secondary">Đã ẩn</span>
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <!-- Duyệt (chỉ hiện khi PENDING hoặc REJECTED) -->
                            <form th:if="${r.status.name() != 'APPROVED'}"
                                  th:action="@{/admin/reviews/{id}/approve(id=${r.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-success" title="Duyệt">
                                    <i class="bi bi-check-lg"></i>
                                </button>
                            </form>
                            <!-- Ẩn (chỉ hiện khi APPROVED hoặc PENDING) -->
                            <form th:if="${r.status.name() != 'REJECTED'}"
                                  th:action="@{/admin/reviews/{id}/reject(id=${r.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-warning" title="Ẩn">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </form>
                            <!-- Xóa vĩnh viễn -->
                            <form th:action="@{/admin/reviews/{id}/delete(id=${r.id})}" method="post"
                                  onsubmit="return confirm('Xóa vĩnh viễn đánh giá này?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reviews)}">
                    <td colspan="7" class="text-center text-muted py-4">Chưa có đánh giá nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
