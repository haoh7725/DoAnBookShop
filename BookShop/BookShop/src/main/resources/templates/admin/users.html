<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý người dùng')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="font-serif fw-bold text-brand fs-3 mb-0">Quản lý người dùng</h1>
        <span class="badge text-bg-secondary fs-6" th:text="${#lists.size(users)} + ' tài khoản'"></span>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible" th:text="${successMsg}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible" th:text="${errorMsg}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Tên đăng nhập</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>SĐT</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th style="width:110px">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td class="text-muted small" th:text="${user.id}"></td>
                    <td class="fw-medium" th:text="${user.username}"></td>
                    <td class="small" th:text="${user.fullName ?: '—'}"></td>
                    <td class="small text-muted" th:text="${user.email ?: '—'}"></td>
                    <td class="small text-muted" th:text="${user.phone ?: '—'}"></td>
                    <td>
                        <span th:if="${user.role.name() == 'ADMIN'}"
                              class="badge text-bg-danger">Admin</span>
                        <span th:if="${user.role.name() == 'USER'}"
                              class="badge text-bg-light border text-dark">User</span>
                    </td>
                    <td>
                        <span th:if="${user.enabled}"
                              class="badge text-bg-success">
                            <i class="bi bi-check-circle me-1"></i>Hoạt động
                        </span>
                        <span th:if="${!user.enabled}"
                              class="badge text-bg-secondary">
                            <i class="bi bi-lock me-1"></i>Đã khóa
                        </span>
                    </td>
                    <td>
                        <!-- Không hiện nút với ADMIN -->
                        <form th:if="${user.role.name() == 'USER'}"
                              th:action="@{/admin/users/{id}/toggle(id=${user.id})}"
                              method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit"
                                    th:class="${user.enabled ?
                                        'btn btn-sm btn-outline-danger' :
                                        'btn btn-sm btn-outline-success'}"
                                    th:onclick="'return confirm(\'' + (${user.enabled} ? 'Khóa' : 'Mở khóa') + ' tài khoản ' + ${user.username} + '?\')'">
                                <i th:class="${user.enabled ? 'bi bi-lock' : 'bi bi-unlock'}"></i>
                                <span th:text="${user.enabled ? 'Khóa' : 'Mở khóa'}"></span>
                            </button>
                        </form>
                        <span th:if="${user.role.name() == 'ADMIN'}"
                              class="text-muted small">—</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="8" class="text-center text-muted py-4">Chưa có tài khoản nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
