<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Chi tiết đơn hàng')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5" style="max-width:860px">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1 class="font-serif fw-bold text-brand fs-3 mb-0">
            Đơn hàng #<span th:text="${order.id}"></span>
        </h1>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible" th:text="${successMsg}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible" th:text="${errorMsg}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- Thông tin đơn + cập nhật trạng thái -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4 mb-3">
                <h6 class="font-serif fw-bold text-brand mb-3">Thông tin đơn hàng</h6>
                <div class="small">
                    <p class="text-muted mb-1">Ngày đặt</p>
                    <p class="fw-medium mb-3"
                       th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></p>

                    <p class="text-muted mb-1">Khách hàng</p>
                    <p class="fw-medium mb-1" th:text="${order.user.fullName ?: order.user.username}"></p>
                    <p class="text-muted mb-3" th:text="${order.user.email}"></p>

                    <p class="text-muted mb-1">Số điện thoại</p>
                    <p class="fw-medium mb-3" th:text="${order.user.phone ?: '—'}"></p>

                    <p class="text-muted mb-1">Địa chỉ giao hàng</p>
                    <p class="fw-medium mb-3" th:text="${order.address}"></p>

                    <p class="text-muted mb-1">Trạng thái hiện tại</p>
                    <span th:switch="${order.status.name()}">
                        <span th:case="'PENDING'"   class="badge text-bg-warning fs-6">Chờ xác nhận</span>
                        <span th:case="'CONFIRMED'" class="badge text-bg-info fs-6">Đã xác nhận</span>
                        <span th:case="'SHIPPING'"  class="badge text-bg-primary fs-6">Đang giao</span>
                        <span th:case="'COMPLETED'" class="badge text-bg-success fs-6">Hoàn thành</span>
                        <span th:case="'CANCELLED'" class="badge text-bg-secondary fs-6">Đã hủy</span>
                    </span>
                </div>
            </div>

            <!-- Cập nhật trạng thái (chỉ hiện khi chưa kết thúc) -->
            <div class="card border-0 shadow-sm p-4"
                 th:if="${order.status.name() != 'COMPLETED' && order.status.name() != 'CANCELLED'}">
                <h6 class="font-serif fw-bold text-brand mb-3">Cập nhật trạng thái</h6>
                <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <select name="status" class="form-select form-select-sm mb-2">
                        <!-- Chỉ hiện trạng thái kế tiếp hợp lệ -->
                        <option th:if="${order.status.name() == 'PENDING'}"
                                value="CONFIRMED">✅ Xác nhận đơn</option>
                        <option th:if="${order.status.name() == 'PENDING'}"
                                value="CANCELLED">❌ Hủy đơn</option>
                        <option th:if="${order.status.name() == 'CONFIRMED'}"
                                value="SHIPPING">🚚 Bắt đầu giao hàng</option>
                        <option th:if="${order.status.name() == 'SHIPPING'}"
                                value="COMPLETED">🎉 Hoàn thành</option>
                    </select>
                    <button type="submit" class="btn btn-brand btn-sm w-100">
                        <i class="bi bi-arrow-right-circle me-1"></i>Cập nhật
                    </button>
                </form>
            </div>

            <!-- Tổng tiền -->
            <div class="card border-0 shadow-sm p-3 mt-3">
                <div class="d-flex justify-content-between fw-bold text-brand">
                    <span>Tổng cộng</span>
                    <span th:text="${#numbers.formatInteger(order.totalPrice,0,'COMMA') + 'đ'}"></span>
                </div>
            </div>
        </div>

        <!-- Danh sách sản phẩm -->
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-3 pb-0">
                    <h6 class="font-serif fw-bold text-brand">Sản phẩm trong đơn</h6>
                </div>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Sách</th>
                            <th class="text-center">SL</th>
                            <th class="text-end">Đơn giá</th>
                            <th class="text-end">Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="d : ${details}">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <img th:if="${d.book.imagePath != null}"
                                         th:src="${d.book.imagePath}"
                                         class="rounded" style="width:40px;height:52px;object-fit:cover"/>
                                    <div th:if="${d.book.imagePath == null}"
                                         class="rounded bg-light d-flex align-items-center justify-content-center"
                                         style="width:40px;height:52px">
                                        <i class="bi bi-book text-muted"></i>
                                    </div>
                                    <div>
                                        <p class="mb-0 fw-medium small" th:text="${d.book.title}"></p>
                                        <p class="mb-0 text-muted" style="font-size:11px" th:text="${d.book.author}"></p>
                                    </div>
                                </div>
                            </td>
                            <td class="text-center fw-medium" th:text="${d.quantity}"></td>
                            <td class="text-end small"
                                th:text="${#numbers.formatInteger(d.price,0,'COMMA') + 'đ'}"></td>
                            <td class="text-end fw-medium text-brand"
                                th:text="${#numbers.formatInteger(d.price * d.quantity,0,'COMMA') + 'đ'}"></td>
                        </tr>
                        </tbody>
                        <tfoot class="table-light">
                        <tr>
                            <td colspan="3" class="text-end fw-bold">Tổng cộng</td>
                            <td class="text-end fw-bold text-brand"
                                th:text="${#numbers.formatInteger(order.totalPrice,0,'COMMA') + 'đ'}"></td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <!-- Timeline trạng thái -->
            <div class="card border-0 shadow-sm p-4 mt-3">
                <h6 class="font-serif fw-bold text-brand mb-3">Luồng trạng thái</h6>
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <th:block th:each="step,iter : ${ {'PENDING','CONFIRMED','SHIPPING','COMPLETED'} }">
                        <span th:with="
                            isCurrent=${order.status.name() == step},
                            isPast=${
                                (step == 'PENDING') ||
                                (step == 'CONFIRMED' && (order.status.name() == 'CONFIRMED' || order.status.name() == 'SHIPPING' || order.status.name() == 'COMPLETED')) ||
                                (step == 'SHIPPING'  && (order.status.name() == 'SHIPPING'  || order.status.name() == 'COMPLETED')) ||
                                (step == 'COMPLETED' && order.status.name() == 'COMPLETED')
                            }"
                              class="badge rounded-pill px-3 py-2"
                              th:classappend="${isCurrent ? ' text-bg-primary' : (isPast ? ' text-bg-success' : ' bg-light text-muted border')}"
                              th:text="${step == 'PENDING' ? 'Chờ xác nhận' :
                                        step == 'CONFIRMED' ? 'Đã xác nhận' :
                                        step == 'SHIPPING' ? 'Đang giao' : 'Hoàn thành'}">
                        </span>
                        <i th:if="${!iter.last}" class="bi bi-arrow-right text-muted small"></i>
                    </th:block>
                    <span th:if="${order.status.name() == 'CANCELLED'}"
                          class="badge text-bg-danger rounded-pill px-3 py-2">Đã hủy</span>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
