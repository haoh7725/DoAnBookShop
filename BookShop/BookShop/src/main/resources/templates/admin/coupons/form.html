<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý mã giảm giá')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="font-serif fw-bold text-brand fs-3 mb-0">Mã giảm giá</h1>
        <a th:href="@{/admin/coupons/add}" class="btn btn-brand">
            <i class="bi bi-plus-lg me-1"></i>Thêm mã mới
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success alert-dismissible" th:text="${successMsg}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Mã</th>
                    <th>Loại</th>
                    <th>Giá trị</th>
                    <th>Đơn tối thiểu</th>
                    <th>Đã dùng / Giới hạn</th>
                    <th>Hết hạn</th>
                    <th>Trạng thái</th>
                    <th style="width:130px"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${coupons}">
                    <td class="fw-bold font-monospace text-brand" th:text="${c.code}"></td>
                    <td>
                        <span th:if="${c.discountType.name() == 'PERCENT'}" class="badge text-bg-info">%</span>
                        <span th:if="${c.discountType.name() == 'FIXED'}"   class="badge text-bg-warning">Cố định</span>
                    </td>
                    <td th:text="${c.discountType.name() == 'PERCENT'
                        ? c.discountValue + '%'
                        : #numbers.formatInteger(c.discountValue,0,'COMMA') + 'đ'}">
                    </td>
                    <td th:text="${c.minOrderAmount > 0
                        ? #numbers.formatInteger(c.minOrderAmount,0,'COMMA') + 'đ'
                        : '—'}">
                    </td>
                    <td>
                        <span th:text="${c.usedCount}"></span>
                        /
                        <span th:text="${c.usageLimit > 0 ? c.usageLimit : '∞'}"></span>
                    </td>
                    <td class="small text-muted"
                        th:text="${c.expiredAt != null
                            ? #temporals.format(c.expiredAt,'dd/MM/yyyy HH:mm')
                            : '—'}">
                    </td>
                    <td>
                        <span th:if="${c.active}"  class="badge text-bg-success">Hoạt động</span>
                        <span th:if="${!c.active}" class="badge text-bg-secondary">Tắt</span>
                    </td>
                    <td class="d-flex gap-1">
                        <a th:href="@{/admin/coupons/edit/{id}(id=${c.id})}"
                           class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/coupons/toggle/{id}(id=${c.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit"
                                    th:class="${c.active ? 'btn btn-sm btn-outline-warning' : 'btn btn-sm btn-outline-success'}"
                                    th:title="${c.active ? 'Vô hiệu hóa' : 'Kích hoạt'}">
                                <i th:class="${c.active ? 'bi bi-pause-fill' : 'bi bi-play-fill'}"></i>
                            </button>
                        </form>
                        <a th:href="@{/admin/coupons/delete/{id}(id=${c.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Xóa mã này?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(coupons)}">
                    <td colspan="8" class="text-center text-muted py-4">Chưa có mã giảm giá nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
